name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  jira-confluence:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: jira-confluence

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: jira-confluence/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run secret scanner
        run: npm run secretlint

      - name: Build TypeScript
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

  github:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: github

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: github/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run secret scanner
        run: npm run secretlint

      - name: Build TypeScript
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true
